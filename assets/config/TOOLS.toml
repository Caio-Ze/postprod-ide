## PostProd Tools — Tool Registry
## Each [[tool]] block becomes a button on the Dashboard.
## Adding a new entry here auto-creates the button — no Rust code changes needed.
## The dashboard embeds this file at compile time.
##
## Fields:
##   id            — unique identifier (camelCase, no spaces)
##   label         — button text (short)
##   description   — subtitle shown below the label
##   icon          — icon name (mapped to IconName in Rust)
##   binary        — executable name (no path)
##   cwd           — working directory relative to runtime_path (runtime tools only)
##   source        — "runtime" (runtime/ folder) or "agent" (agent_tools/ folder)
##   tier          — "featured" | "standard" | "compact"
##   needs_session — true if the tool needs --session <path> argument

# ═══════════════════════════════════════════════════════════════════════════
# FEATURED — Large hero buttons (master launchers and key workflows)
# ═══════════════════════════════════════════════════════════════════════════

[[tool]]
id = "sessionMonitor"
label = "Session Monitor"
description = "Real-time session monitoring — calls all tools in bin/Session_Monitor/"
icon = "tool_terminal"
binary = "session-monitor"
cwd = "bin/Session_Monitor"
source = "runtime"
tier = "featured"
needs_session = false

[[tool]]
id = "batchProcessing"
label = "Batch Processing"
description = "Interactive batch launcher — calls all tools in bin/Pro_Tools_Batch_Processing_Runtime/"
icon = "play_filled"
binary = "start-scripts-pro-tools-batch-processing"
cwd = "bin/Pro_Tools_Batch_Processing_Runtime"
source = "runtime"
tier = "featured"
needs_session = false

[[tool]]
id = "importSfx"
label = "SFX Workflow (Gemini)"
description = "AI-powered SFX creation from video with visual feedback"
icon = "sparkle"
binary = "sfx-tauri"
cwd = "bin/SFX_Workflow_Runtime"
source = "runtime"
tier = "featured"
needs_session = false

[[tool.param]]
key = "model"
label = "AI Model"
placeholder = "Select model"
default = "flash"
param_type = "select"
options = ["flash", "pro"]

[[tool.param]]
key = "fps"
label = "Video FPS"
placeholder = "Frames per second"
default = "4"
param_type = "select"
options = ["4", "8", "10"]

[[tool]]
id = "tvToSpotWorkflow"
label = "TV -> SPOT Workflow"
description = "Full TV to SPOT session conversion pipeline"
icon = "forward_arrow"
binary = "from-tv-to-spot-workflow"
cwd = "bin/Pro_Tools_Batch_Processing_Runtime/bin"
source = "runtime"
tier = "featured"
needs_session = false

