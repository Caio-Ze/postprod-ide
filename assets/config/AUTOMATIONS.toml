## PostProd Tools — Automation Prompts
## Each [[automation]] block becomes a one-click button on the Dashboard.
## Edit this file to add/remove/change automations — no recompilation needed.
## The dashboard re-reads this file periodically.
##
## Fields:
##   id          — unique identifier (no spaces)
##   label       — button text (short)
##   description — subtitle shown below the label
##   icon        — icon name (play, zap, mic, folder, audio, sparkle, replace, arrow_up_right)
##   prompt      — the prompt template sent to the agent
##
## Variables:
##   {session_path}  — replaced at runtime with the current Pro Tools session path
##   {pasta_ativa}   — replaced at runtime with the active folder path (selected on the dashboard)

[[automation]]
id = "bounce-trilha"
label = "Bounce TRILHA"
description = "Select clips, set timeline, bounce to WAV"
icon = "play"
prompt = """
Using the PTSL agent tools on {session_path}:
1. Verify {session_path} is the open session (use get_session_path)
2. Run select-clips on TRILHA to set the full timeline
3. Bounce to WAV format
4. Report the output file path
"""

[[automation]]
id = "import-solo-track"
label = "Import & Solo Track"
description = "Import tracks from source, solo LOC, verify"
icon = "sparkle"
prompt = """
Using the PTSL agent tools on {session_path}:
1. Verify {session_path} is the open session (use get_session_path)
2. Ask me for the source session path
3. Import all tracks from source into {session_path}
4. Solo the LOC track (hide+inactivate everything else)
5. Verify with list that only LOC is active
"""

[[automation]]
id = "batch-process"
label = "Batch Process Sessions"
description = "Import, solo, bounce all sessions in active folder"
icon = "zap"
prompt = """
Using the PTSL agent tools, process all .ptx sessions in {pasta_ativa}.
For each session subfolder, pick only the highest version .ptx file.
For each session:
1. Verify it's the open session (use get_session_path), open if not
2. List tracks and verify state
3. Select all clips on LOC to set timeline
4. Bounce to WAV
5. Wait 5 seconds before next session
Report progress after each session.
"""

[[automation]]
id = "rename-tracks"
label = "Rename All Tracks"
description = "List tracks and rename interactively"
icon = "replace"
prompt = """
Using the PTSL agent tools on {session_path}:
1. Verify {session_path} is the open session (use get_session_path)
2. List all tracks
3. Show me the track list and ask which tracks I want to rename
4. For each track I specify, rename it to the new name I provide
5. Verify the final track list
"""

[[automation]]
id = "export-normalize"
label = "Export & Normalize"
description = "Export LOC, normalize -23 LUFS, convert MP3"
icon = "audio"
prompt = """
Using the PTSL agent tools on {session_path}:
1. Verify {session_path} is the open session (use get_session_path)
2. Export the LOC track from {session_path}
3. Normalize the exported WAV to -23 LUFS using agent-bounce-normalize-tv
4. Convert the normalized file to MP3 using agent-convert-mp3
5. Report all output file paths
"""

[[automation]]
id = "volume-adjust"
label = "Volume Adjust"
description = "Set track volume (automation must be Read mode)"
icon = "audio"
prompt = """
Using the PTSL agent tools on {session_path}:
1. Verify {session_path} is the open session (use get_session_path)
2. List all tracks
3. Ask me which track and what dB value to set
4. Set the track volume using agent-track-volume
Note: Track automation mode must be Read/Touch/Latch for the fader to move.
"""

[[automation]]
id = "full-delivery"
label = "Full Delivery"
description = "Bounce, normalize, MP3, organize to Finalizados"
icon = "zap"
prompt = """
Using the PTSL agent tools, perform full delivery for {session_path}:
1. Verify {session_path} is the open session (use get_session_path)
2. Select all clips on LOC to set timeline
3. Bounce to WAV
4. Apply audio filter (agent-apply-audio-filter)
5. Normalize to -23 LUFS (agent-bounce-normalize-tv)
6. Convert to MP3 (agent-convert-mp3)
7. Organize files to ~/ProTools_Suite/4_Finalizados/ (TV/, NET/, MP3/)
8. Report the final file inventory
"""

[[automation]]
id = "compare-texts"
label = "Compare Texts"
description = "Transcribe audio, extract reference, compare"
icon = "mic"
prompt = """
Using the PTSL agent tools:
1. Ask me for the audio file path and the reference document path
2. Transcribe the audio using agent-transcribe-audio
3. Extract text from the reference document using agent-extract-text
4. Compare both texts using agent-compare-texts
5. Report the differences found
"""

[[automation]]
id = "vol-up-bounce-all"
label = "Set Vol & Bounce All"
description = "Set LOC volume and bounce the latest version of every session in active folder"
icon = "zap"
prompt = """
Using the PTSL agent tools, process sessions in {pasta_ativa}.
For each session subfolder, pick only the highest version .ptx file.
BEFORE processing, ask me what absolute volume (in dB) to set for the LOC track. We cannot check the current volume, so I must tell you the exact value. Ask once, apply to all sessions.
For each session (latest version only):
1. Verify it's the open session (use get_session_path), open if not
2. Set the LOC track volume to the value I specified using agent-track-volume
3. Select the TRILHA track
4. Select clips on TRILHA to get the audio timeline size
5. Bounce to WAV — save in that session's own Bounced Files folder
6. Wait 5 seconds before next session
Report progress after each session.
"""

[[automation]]
id = "vol-up-all"
label = "Set Vol All"
description = "Set LOC volume in the latest version of every session in active folder"
icon = "audio"
prompt = """
Using the PTSL agent tools, process sessions in {pasta_ativa}.
For each session subfolder, pick only the highest version .ptx file.
BEFORE processing, ask me what absolute volume (in dB) to set for the LOC track. We cannot check the current volume, so I must tell you the exact value. Ask once, apply to all sessions.
For each session (latest version only):
1. Verify it's the open session (use get_session_path), open if not
2. Set the LOC track volume to the value I specified using agent-track-volume
3. Select the TRILHA track
4. Select clips on TRILHA to get the audio timeline size
5. Bounce to WAV — save in that session's own Bounced Files folder
6. Wait 5 seconds before next session
Report progress after each session.
"""

[[automation]]
id = "create-automation"
label = "Create New Button"
description = "I'll help you create a new dashboard button"
icon = "sparkle"
prompt = """
I want to create a new one-click button for the ProTools Studio dashboard.

IMPORTANT: First read ~/ProTools_Suite/config/SKILL.md — it contains all the rules, domain knowledge, session lifecycle, and bouncing workflow that every automation inherits. Prompts should be SHORT (4-8 lines of task steps). Do not repeat anything that SKILL.md already covers (behavioral rules, backup file filtering, folder structure, version convention, tool usage details).

How automation buttons work:
- Default buttons: ~/ProTools_Suite/config/AUTOMATIONS.toml (read-only — overwritten on app updates)
- Custom buttons: ~/ProTools_Suite/config/AUTOMATIONS.user.toml (never overwritten)
- Each button has: id, label, description, icon, and prompt
- Available icons: play, zap, mic, folder, audio, sparkle, replace, arrow_up_right
- The dashboard replaces two template variables at runtime before the agent sees the prompt:
  - Wrap session_path in curly braces → replaced with the .ptx file currently open in Pro Tools
  - Wrap pasta_ativa in curly braces → replaced with the folder selected on the dashboard
  Use these variables in prompts so the agent gets real paths at runtime.
- The dashboard picks up changes automatically — no restart needed

Prompt style convention:
- Start with "Using the PTSL agent tools on [session_path variable]:" for single-session operations
- Start with "Using the PTSL agent tools, process sessions in [pasta_ativa variable]." for batch/folder operations
- Then list numbered task steps (4-8 lines). Be direct. The skill handles everything else.
- Always include a "Verify session is open (use get_session_path)" step before PTSL operations.

First, read AUTOMATIONS.toml, AUTOMATIONS.user.toml, and SKILL.md.
Show me a summary of existing buttons.

Then ask me:
1. What should the button be called? (short name, 2-3 words)
2. What should it do? (in plain language)
3. Which icon fits best? Show me the options.

Create the new [[automation]] block in AUTOMATIONS.user.toml.
Never modify AUTOMATIONS.toml.
"""

[[automation]]
id = "edit-automation"
label = "Edit a Button"
description = "I'll help you change an existing dashboard button"
icon = "replace"
prompt = """
I want to edit one of my existing dashboard buttons in ProTools Studio.

IMPORTANT: First read ~/ProTools_Suite/config/SKILL.md — it contains all the rules, domain knowledge, session lifecycle, and bouncing workflow that every automation inherits. Prompts should be SHORT (4-8 lines of task steps). Do not repeat anything that SKILL.md already covers.

How automation buttons work:
- Default buttons: ~/ProTools_Suite/config/AUTOMATIONS.toml (read-only — overwritten on app updates)
- Custom buttons: ~/ProTools_Suite/config/AUTOMATIONS.user.toml (never overwritten)
- Each button has: id, label, description, icon, and prompt
- Available icons: play, zap, mic, folder, audio, sparkle, replace, arrow_up_right
- The dashboard replaces two template variables at runtime before the agent sees the prompt:
  - Wrap session_path in curly braces → replaced with the .ptx file currently open in Pro Tools
  - Wrap pasta_ativa in curly braces → replaced with the folder selected on the dashboard
  Use these variables in prompts so the agent gets real paths at runtime.
- Changes are picked up automatically — no restart needed

First, read AUTOMATIONS.toml, AUTOMATIONS.user.toml, and SKILL.md.
Show me a numbered list of all buttons with names and what they do.

Then ask me:
1. Which button to change? (by number)
2. What to change? (name, description, steps, icon, or delete it)
3. What should the new value be?

When editing prompts, follow the style convention: short numbered steps, start with "Using the PTSL agent tools on [session_path variable]:" or "...in [pasta_ativa variable].", always include session verification. See existing prompts in the file for examples.

Make changes in AUTOMATIONS.user.toml only. To override a default, copy its block with the same id.
Never modify AUTOMATIONS.toml.
"""
