id = "batch-process"
label = "Batch Process Sessions"
description = "Bounce all sessions in the active folder"
icon = "zap"
prompt = """
Using the PTSL agent tools, process sessions in {pasta_ativa}.
IMPORTANT: Only process sessions inside {pasta_ativa}. Do not access or modify anything outside this folder.
1. List session subfolders and find the highest-version .ptx in each.
2. For each session, run these commands directly in Bash (no scripts):
   agent-manage-tracks --session <PTX> --track {track} --output-json select-clips
   agent-bounce-export --output-json
4. Sleep 5 seconds before next session. Report progress after each one.

After completing the task: if you encountered errors, limitations, or workarounds, or if the user stated any preferences — create a dated report file in ~/ProTools_Suite/plugin/skills/ptsl-tools/reports/ (e.g. reports/YYYY-MM-DD_batch-process.md). Do NOT edit SKILL.md or reference.md directly.
"""

[[param]]
key = "track"
label = "Track"
placeholder = "TRILHA"
default = "TRILHA"
param_type = "text"

[[context]]
type = "command"
run = "ls -1 {pasta_ativa}"
label = "Session folders in active folder"
