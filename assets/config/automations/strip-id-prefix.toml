id = "strip-id-prefix"
label = "Strip ID Prefix"
description = "Remove 5-digit numeric prefix from session folder and file names (12345_sp → sp)"
icon = "replace"
prompt = """
Process session folders in {pasta_ativa}.
1. Check if any session from this folder is open in Pro Tools (use get_session_path). If so, skip that session and warn the user.
2. List all subfolders whose names start with 5 digits followed by an underscore (e.g. 18699_SP, 18700_CUR).
3. Show the active folder full path, how many sessions matched, and a before → after preview with full paths for each folder and .ptx file. Ask for confirmation.
4. Once confirmed, rename each folder by removing the 5-digit prefix and underscore. Rename matching .ptx files inside, preserving _V suffixes.
5. Print a final summary of everything renamed.
"""

[[context]]
type = "command"
run = "ls -1 {pasta_ativa}"
label = "Session folders in active folder"
