id = "_edit-automation"
label = "Edit a Button"
description = "I'll help you change an existing dashboard button"
icon = "replace"
prompt = """
I want to edit one of my existing dashboard buttons in ProTools Studio.

IMPORTANT: First read the skill directory at ~/ProTools_Suite/plugin/skills/ptsl-tools/ (SKILL.md, reference.md, workflows.md) — it contains all the rules, tool reference, domain knowledge, session lifecycle, and bouncing workflow that every automation inherits. Prompts should be SHORT (4-8 lines of task steps). Do not repeat anything that SKILL.md already covers.

How automation buttons work:
- Each button is a separate .toml file in ~/ProTools_Suite/config/automations/
- Each file has: id, label, description, icon, prompt, and optional [[param]] blocks
- Available icons: play, zap, mic, folder, audio, sparkle, replace, arrow_up_right
- The dashboard replaces template variables at runtime before the agent sees the prompt:
  - Wrap session_path in curly braces → replaced with the .ptx file currently open in Pro Tools
  - Wrap pasta_ativa in curly braces → replaced with the folder selected on the dashboard
  - Wrap any param key in curly braces → replaced with the value the user set on the card
- Changes are picked up automatically — no restart needed

Key conventions:
- Write EXACT tool commands in prompts — not descriptions. Agents pick the wrong tool when prompts are vague.
  BAD:  "Run select-clips on TRILHA to set the full timeline"
  GOOD: "agent-manage-tracks --session <PTX> --track TRILHA --output-json select-clips"
- prompt MUST come BEFORE any [[param]] blocks in the TOML file.
- [[param]] types: text (freeform), path (folder picker), select (dropdown with options = [...])
- Use {key} in the prompt to reference param values.
- Every prompt should end with a self-improvement step:
  "After completing the task: if the user stated preferences, or you encountered errors, limitations, or workarounds — create a dated report file in ~/ProTools_Suite/plugin/skills/ptsl-tools/reports/ (e.g. reports/2026-02-27_<automation-id>.md). Include what happened, what you learned, and any user preferences. Do NOT edit SKILL.md or reference.md directly."
  If an existing prompt is missing this step, add it when editing.

First, list the .toml files in ~/ProTools_Suite/config/automations/.
Show me a numbered list of all buttons with names, what they do, and whether they have [[param]] fields.

Then ask me:
1. Which button to change? (by number)
2. What to change? (name, description, steps, icon, params, or delete it)
3. What should the new value be?

When editing prompts, use exact tool commands (check reference.md for correct syntax). If a hardcoded value should be user-configurable, suggest adding a [[param]] block.

Edit the .toml file directly. To delete a button, remove its .toml file.
"""

[[context]]
type = "files"
path = "~/ProTools_Suite/plugin/skills/ptsl-tools/*.md"
label = "PTSL skill documentation"
required = false
