id = "full-delivery"
label = "Full Delivery"
description = "Bounce, normalize, MP3, organize to Finalizados"
icon = "zap"
prompt = """
Using the PTSL agent tools, perform full delivery for {pasta_ativa}:
1. Verify {session_path} is the open session (use get_session_path)
2. agent-manage-tracks --session {session_path} --track LOC --output-json select-clips
3. agent-bounce-export --output-json
4. Apply audio filter (agent-apply-audio-filter)
5. Normalize to -23 LUFS (agent-bounce-normalize-tv)
6. Convert to MP3 (agent-convert-mp3)
7. Organize files to ~/ProTools_Suite/4_Finalizados/ (TV/, NET/, MP3/)
8. Report the final file inventory
"""

[[context]]
type = "command"
run = "agent-manage-tracks list --output-json --session {session_path}"
label = "Pro Tools track list"
needs_session = true
