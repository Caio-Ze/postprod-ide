id = "rename-tracks"
label = "Rename All Tracks"
description = "List tracks and rename interactively"
icon = "replace"
prompt = """
Using the PTSL agent tools on {session_path}:
1. Verify {session_path} is the open session (use get_session_path)
2. List all tracks
3. Show me the track list and ask which tracks I want to rename
4. For each track I specify, rename it to the new name I provide
5. Verify the final track list

After completing the task: if you encountered errors, limitations, or workarounds, or if the user stated any preferences — create a dated report file in ~/ProTools_Suite/plugin/skills/ptsl-tools/reports/ (e.g. reports/YYYY-MM-DD_rename-tracks.md). Do NOT edit SKILL.md or reference.md directly.
"""

[[context]]
type = "command"
run = "agent-manage-tracks list --output-json --session {session_path}"
label = "Pro Tools track list"
needs_session = true
