id = "vol-up-bounce-all"
label = "Set Vol & Bounce All"
description = "Set LOC volume and bounce every session in the active folder"
icon = "zap"
prompt = """
Using the PTSL agent tools, process sessions in {pasta_ativa}.
IMPORTANT: Only process sessions inside {pasta_ativa}. Do not access or modify anything outside this folder.
1. List session subfolders and find the highest-version .ptx in each.
2. For each session, run this command directly in Bash (no scripts):
   agent-track-volume --session <PTX> --track {track} --output-json --value <DB>
   For negative dB use equals syntax: --value=-3.0 (not --value -3.0).
3. agent-manage-tracks --session <PTX> --track TRILHA --output-json select-clips
4. agent-bounce-export --output-json
5. Sleep 5 seconds before next session. Report progress after each one.

volume: {volume}
If a dB value is set above, use it directly. If empty, ask me before starting.
"""

[[param]]
key = "volume"
label = "Volume (dB)"
placeholder = "+1.0"
default = "+1.0"
param_type = "text"

[[param]]
key = "track"
label = "Track"
placeholder = "LOC"
default = "LOC"
param_type = "text"

[[context]]
type = "command"
run = "ls -1 {pasta_ativa}"
label = "Session folders in active folder"
