id = "import-loc-marker"
label = "Import LOC at IN"
description = "Import the latest audio from each session's LOC folder and spot it at the IN marker"
icon = "arrow_up_right"
prompt = """
Using the PTSL agent tools, process sessions in {pasta_ativa}.
IMPORTANT: Only process sessions inside {pasta_ativa}. Do not access or modify anything outside this folder.
1. List session subfolders and find the highest-version .ptx in each (_V2 > _V1 > no suffix).
2. For each session, run these commands directly in Bash (no scripts):
   a. Find the most recent .wav file in the session's LOC subfolder (by modification date).
   b. agent-manage-tracks --session <PTX> --output-json markers — extract the IN marker start_time from the JSON (note: output has text before the JSON, parse from the first '{').
   c. agent-import-audio --file <WAV> --output-json — extract clip_id from JSON. This is an open-session tool; the markers command above leaves the session open.
   d. agent-spot-clip --clip-id <CLIP_ID> --track LOC --position <IN_SAMPLE> --output-json
3. If a session has no LOC folder, no .wav files, or no IN marker, skip it and report why.
4. Sleep 5 seconds before next session. Report progress after each one.
"""
