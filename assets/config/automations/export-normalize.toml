id = "export-normalize"
label = "Export & Normalize"
description = "Export LOC, normalize -23 LUFS, convert MP3"
icon = "audio"
prompt = """
Using the PTSL agent tools on {session_path}:
1. Verify {session_path} is the open session (use get_session_path)
2. Export the LOC track from {session_path}
3. Normalize the exported WAV to -23 LUFS using agent-bounce-normalize-tv
4. Convert the normalized file to MP3 using agent-convert-mp3
5. Report all output file paths

After completing the task: if you encountered errors, limitations, or workarounds, or if the user stated any preferences — create a dated report file in ~/ProTools_Suite/plugin/skills/ptsl-tools/reports/ (e.g. reports/YYYY-MM-DD_export-normalize.md). Do NOT edit SKILL.md or reference.md directly.
"""

[[context]]
type = "command"
run = "agent-manage-tracks list --output-json --session {session_path}"
label = "Pro Tools track list"
needs_session = true
