id = "volume-adjust"
label = "Volume Adjust"
description = "Set track volume (automation must be Read mode)"
icon = "audio"
prompt = """
Using the PTSL agent tools on {session_path}:
1. Verify {session_path} is the open session (use get_session_path)
2. List all tracks
3. Ask me which track and what dB value to set
4. Set the track volume: agent-track-volume --session <PTX> --track <NAME> --output-json --value <DB>
Note: Track automation mode must be Read/Touch/Latch for the fader to move.

After completing the task: if you encountered errors, limitations, or workarounds, or if the user stated any preferences — create a dated report file in ~/ProTools_Suite/plugin/skills/ptsl-tools/reports/ (e.g. reports/YYYY-MM-DD_volume-adjust.md). Do NOT edit SKILL.md or reference.md directly.
"""

[[context]]
type = "command"
run = "agent-manage-tracks list --output-json --session {session_path}"
label = "Pro Tools track list"
needs_session = true
