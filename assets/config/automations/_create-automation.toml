id = "_create-automation"
label = "Create New Button"
description = "I'll help you create a new dashboard button"
icon = "sparkle"
prompt = """
I want to create a new one-click button for the ProTools Studio dashboard.

IMPORTANT: First read the skill directory at ~/ProTools_Suite/config/skills/ptsl-tools/ (SKILL.md, reference.md, workflows.md) — it contains all the rules, tool reference, domain knowledge, session lifecycle, and bouncing workflow that every automation inherits. Prompts should be SHORT (4-8 lines of task steps). Do not repeat anything that SKILL.md already covers (behavioral rules, backup file filtering, folder structure, version convention, tool usage details).

How automation buttons work:
- Each button is a separate .toml file in ~/ProTools_Suite/config/automations/
- Each file has: id, label, description, icon, and prompt
- Available icons: play, zap, mic, folder, audio, sparkle, replace, arrow_up_right
- The dashboard replaces template variables at runtime before the agent sees the prompt:
  - Wrap session_path in curly braces → replaced with the .ptx file currently open in Pro Tools
  - Wrap pasta_ativa in curly braces → replaced with the folder selected on the dashboard
  Use these variables in prompts so the agent gets real paths at runtime.
- The dashboard picks up new files automatically — no restart needed

Prompt style convention:
- Start with "Using the PTSL agent tools on [session_path variable]:" for single-session operations
- Start with "Using the PTSL agent tools, process sessions in [pasta_ativa variable]." for batch/folder operations
- Write EXACT tool commands — not descriptions. Agents pick the wrong tool when prompts are vague.
  BAD:  "Run select-clips on TRILHA to set the full timeline"
  GOOD: "agent-manage-tracks --session <PTX> --track TRILHA --output-json select-clips"
  BAD:  "Bounce to WAV"
  GOOD: "agent-bounce-export --output-json"
- Tool binaries are at ~/ProTools_Suite/tools/agent/. Use just the binary name in prompts (agents resolve the path from the skill).
- Always include a "Verify session is open (use get_session_path)" step before PTSL operations.
- Every prompt MUST end with a self-improvement step:
  "After completing the task: (1) If the user stated any preferences during this conversation (always/never do X, naming conventions, workflow choices), add them to the User Preferences section of ~/ProTools_Suite/config/skills/ptsl-tools/SKILL.md. (2) If you encountered errors, limitations, or workarounds, add a dated entry to the Agent Learnings section of the same file."
  SKILL.md has two agent-writable sections at the bottom (User Preferences and Agent Learnings) — these are the ONLY parts agents may modify.
- prompt MUST come BEFORE any [[param]] blocks in the TOML file.

Runtime parameters ([[param]]):
- Buttons can have inline parameter fields that the user fills in on the dashboard card.
- Values persist across restarts and interpolate into prompts as {key}.
- Three types:
  param_type = "text"    → freeform input (volume, track name, etc.)
  param_type = "path"    → folder picker button
  param_type = "select"  → dropdown menu (requires options = ["opt1", "opt2", ...])
- Each [[param]] block needs: key, label, placeholder, default, param_type
- Example (text):
  [[param]]
  key = "volume"
  label = "Volume (dB)"
  placeholder = "+1.0"
  default = "+1.0"
  param_type = "text"
- Example (select):
  [[param]]
  key = "format"
  label = "Format"
  placeholder = "wav"
  default = "wav"
  param_type = "select"
  options = ["wav", "mp3", "aiff"]
- Use {key} in the prompt to reference the value (e.g., "--value {volume}")
- Ask the user if any step has a value that should be configurable per-run.

First, list the existing .toml files in ~/ProTools_Suite/config/automations/.
Show me a summary of existing buttons (include which ones have [[param]] fields).

Then ask me:
1. What should the button be called? (short name, 2-3 words)
2. What should it do? (in plain language)
3. Which icon fits best? Show me the options.
4. Are there any values that should be configurable per-run? (volume, track name, folder, format, etc.)

Create a new .toml file in ~/ProTools_Suite/config/automations/ using the id as the filename (e.g., my-button.toml).
"""
