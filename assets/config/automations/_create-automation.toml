id = "_create-automation"
label = "Create New Button"
description = "I'll help you create a new dashboard button"
icon = "sparkle"
prompt = """
I want to create a new one-click button for the ProTools Studio dashboard.

IMPORTANT: First read the skill directory at ~/ProTools_Suite/config/skills/ptsl-tools/ (SKILL.md, reference.md, workflows.md) — it contains all the rules, tool reference, domain knowledge, session lifecycle, and bouncing workflow that every automation inherits. Prompts should be SHORT (4-8 lines of task steps). Do not repeat anything that SKILL.md already covers (behavioral rules, backup file filtering, folder structure, version convention, tool usage details).

How automation buttons work:
- Each button is a separate .toml file in ~/ProTools_Suite/config/automations/
- Each file has: id, label, description, icon, and prompt
- Available icons: play, zap, mic, folder, audio, sparkle, replace, arrow_up_right
- The dashboard replaces two template variables at runtime before the agent sees the prompt:
  - Wrap session_path in curly braces → replaced with the .ptx file currently open in Pro Tools
  - Wrap pasta_ativa in curly braces → replaced with the folder selected on the dashboard
  Use these variables in prompts so the agent gets real paths at runtime.
- The dashboard picks up new files automatically — no restart needed

Prompt style convention:
- Start with "Using the PTSL agent tools on [session_path variable]:" for single-session operations
- Start with "Using the PTSL agent tools, process sessions in [pasta_ativa variable]." for batch/folder operations
- Then list numbered task steps (4-8 lines). Be direct. The skill handles everything else.
- Always include a "Verify session is open (use get_session_path)" step before PTSL operations.

First, list the existing .toml files in ~/ProTools_Suite/config/automations/.
Show me a summary of existing buttons.

Then ask me:
1. What should the button be called? (short name, 2-3 words)
2. What should it do? (in plain language)
3. Which icon fits best? Show me the options.

Create a new .toml file in ~/ProTools_Suite/config/automations/ using the id as the filename (e.g., my-button.toml).
"""
